<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>めじこんさば</title>
    <style>
        /* 🎨 全体の背景を少し高級感のあるグラデーションに */
        body {
            background: radial-gradient(circle at center, #23272a 0%, #0f1112 100%);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            margin: 0;
            overflow-x: hidden;
        }

        /* 🔵 サーバーアイコン：光るエフェクト（グロウ効果）を追加 */
        .server-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* アイコンにマウスを載せると少し回転しながら大きくなる */
        .server-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.8);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 12px;
            letter-spacing: 3px;
            text-align: center;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #b9bbbe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #b9bbbe;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.8;
            max-width: 400px;
        }
        /* 連絡先のユーザー名を少し目立たせる */
        p code {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            margin: 0 2px;
            color: #e3e5e8;
        }

        /* 🟢 オンライン人数の表示（よりDiscordのUIに近いデザインに） */
        .status-container {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            margin-bottom: 30px;
            background: rgba(47, 49, 54, 0.6);
            backdrop-filter: blur(10px); /* 背景をぼかすおしゃれエフェクト */
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* オンラインの緑ドットをピコピコ光らせる（アニメーション） */
        .dot-online {
            width: 10px;
            height: 10px;
            background-color: #23a55a;
            border-radius: 50%;
            position: relative;
        }
        .dot-online::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: #23a55a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* 💜 Discordボタン：立体感と押し心地をアップ */
        .discord-btn {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(88, 101, 242, 0.6);
        }
        .discord-btn:active {
            transform: translateY(-1px);
        }

        /* 🔗 コピペボタン：ただのリンク文字から「静かなボタン」へ変更 */
        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #b9bbbe;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            padding: 6px 16px;
        }
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        @media (min-width: 600px) {
            h1 { font-size: 2.8rem; }
            p { font-size: 1rem; }
            .server-icon { width: 110px; height: 110px; }
        }
    </style>
</head>
<body>

    <img src="https://i.imgur.com/B7UUQKA.jpeg" alt="" class="server-icon" id="server-logo">

    <h1>めじこんさばのさいと</h1>

    <p>
        めじこんさばのさいとらしいよ<br>
        連絡先 <code>@xkzw</code><code>@pxho</code><code><code>@efqg</code><code>@xjbz</code><code>@48244</code><br>
        <code>@xkzw</code> がめいんです
    </p>

    <div class="status-container" id="discord-status">
        <span style="color: #888;">情報を取得中...</span>
    </div>

    <a href="https://discord.gg/medicon" target="_blank" class="discord-btn">
        めじこ n さばにはいる
    </a>

    <button class="copy-btn" onclick="copyInviteLink(this)">りんくをこぴー</button>

    <script>
        const SERVER_ID = '1493270400316997642';
        const INVITE_URL = 'https://discord.gg/medicon';

        async function fetchDiscordStatus() {
            try {
                const response = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
                if (!response.ok) throw new Error('取得失敗');
                
                const data = await response.json();
                const onlineCount = data.presence_count ?? 0;
                
                document.getElementById('discord-status').innerHTML = `
                    <div class="status-item">
                        <span class="dot-online"></span>
                        <span>おんらいん: <strong>${onlineCount}</strong>人</span>
                    </div>
                `;
            } catch (error) {
                document.getElementById('discord-status').innerHTML = `
                    <span style="color: #ff4747; font-size: 0.8rem;">ステータスを取得できませんでした</span>
                `;
                console.error(error);
            }
        }

        function copyInviteLink(button) {
            navigator.clipboard.writeText(INVITE_URL).then(() => {
                const originalText = button.innerText;
                button.innerText = 'こぴーできたよ！';
                button.style.color = '#23a55a';
                button.style.backgroundColor = 'rgba(35, 165, 90, 0.1)';
                button.style.borderColor = '#23a55a';
                
                setTimeout(() => {
                    button.innerText = originalText;
                    button.style.color = '';
                    button.style.backgroundColor = '';
                    button.style.borderColor = '';
                }, 1500);
            }).catch(err => {
                alert('コピーに失敗しました: ' + INVITE_URL);
            });
        }

        fetchDiscordStatus();
    </script>

</body>
</html>
